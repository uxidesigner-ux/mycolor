name: Deploy photo analysis Worker

on:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy Worker and OpenAI secret
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4"
          command: deploy
          secrets: |
            OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Write deployment summary
        env:
          WORKER_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "## MOI photo analysis Worker" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed URL: $WORKER_URL" >> "$GITHUB_STEP_SUMMARY"
